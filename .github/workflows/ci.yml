name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:

  bandit_scan:
    name: Bandit SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Run Bandit
  run: |
    pip install bandit[sarif]
    bandit -r . -f sarif -o bandit.sarif || true

- name: Upload SARIF
  uses: github/codeql-action/upload-sarif@v3
  with:
    sarif_file: bandit.sarif


  semgrep_scan:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
  run: |
    semgrep scan --severity=ERROR --severity=WARNING --sarif --output=semgrep.sarif || true

- name: Upload SARIF
  uses: github/codeql-action/upload-sarif@v3
  with:
    sarif_file: semgrep.sarif


  docker_build_scan:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: [bandit_scan, semgrep_scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pygoat-app .

      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: pygoat-app
          continue-on-error: true
